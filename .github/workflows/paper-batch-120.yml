name: paper-batch-120

on:
  workflow_dispatch:
    inputs:
      repeats:
        description: "每场景重复次数（默认 20 => 总计 120 次）"
        required: true
        default: "20"
      run_duration_sec:
        description: "单次仿真时长（秒）"
        required: true
        default: "180"
      seed_base:
        description: "随机种子基数（可复现）"
        required: true
        default: "20260417"

permissions:
  contents: read

concurrency:
  group: paper-batch-120-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-batch:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - { name: basic, file: scenario_basic.yaml }
          - { name: typical, file: scenario_typical.yaml }
          - { name: stress, file: scenario_stress.yaml }
        mode:
          - baseline
          - proposed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install system deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3-rosdep \
            python3-colcon-common-extensions \
            python3-matplotlib \
            python3-setuptools \
            python3-yaml \
            ros-jazzy-ament-package \
            ros-jazzy-ament-cmake \
            ros-jazzy-ament-cmake-python

      - name: Install ROS deps via rosdep
        run: |
          set -euo pipefail
          sudo rosdep init || true
          rosdep update
          rosdep install --from-paths src --ignore-src -y --rosdistro jazzy --skip-keys "ament_python"

      - name: Build workspace
        run: |
          set -euo pipefail
          set +u
          source /opt/ros/jazzy/setup.bash
          set -u
          colcon build --symlink-install

      - name: Run batch simulation
        env:
          REPEATS: ${{ inputs.repeats || '20' }}
          RUN_DURATION: ${{ inputs.run_duration_sec || '180' }}
          SEED_BASE: ${{ inputs.seed_base || '20260417' }}
          SCENARIO_FILE: ${{ matrix.scenario.file }}
          SCENARIO_NAME: ${{ matrix.scenario.name }}
          MODE: ${{ matrix.mode }}
        run: |
          set -euo pipefail
          set +u
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          set -u

          RAW_DIR="${GITHUB_WORKSPACE}/paper_artifacts/${SCENARIO_NAME}/${MODE}/raw"
          mkdir -p "${RAW_DIR}"

          timeout_sec=$(( RUN_DURATION * 3 ))
          if [ "${timeout_sec}" -lt 300 ]; then timeout_sec=300; fi

          ros2 run orchard_evaluation batch_runner \
            --scenario "src/orchard_bringup/config/${SCENARIO_FILE}" \
            --modes "${MODE}" \
            --repeats "${REPEATS}" \
            --run-duration-sec "${RUN_DURATION}" \
            --seed-base "${SEED_BASE}" \
            --timeout-sec "${timeout_sec}" \
            --retry 1 \
            --retry-wait-sec 3 \
            --out-dir "${RAW_DIR}"

      - name: Generate scenario-mode report
        if: always()
        env:
          MPLBACKEND: Agg
          SCENARIO_NAME: ${{ matrix.scenario.name }}
          MODE: ${{ matrix.mode }}
        run: |
          set -euo pipefail

          RAW_DIR="${GITHUB_WORKSPACE}/paper_artifacts/${SCENARIO_NAME}/${MODE}/raw"
          FIG_DIR="${GITHUB_WORKSPACE}/paper_artifacts/${SCENARIO_NAME}/${MODE}/fig"
          mkdir -p "${FIG_DIR}"

          if [ ! -d "${RAW_DIR}" ]; then
            echo "raw directory not found, skip report: ${RAW_DIR}"
            exit 0
          fi

          python3 src/orchard_evaluation/orchard_evaluation/report_generator.py \
            --input-dir "${RAW_DIR}" \
            --output-dir "${FIG_DIR}" \
            --modes "${MODE}" \
            --scenario-name "${SCENARIO_NAME}"

      - name: Write scenario-mode summary
        if: always()
        env:
          SCENARIO_NAME: ${{ matrix.scenario.name }}
          MODE: ${{ matrix.mode }}
        run: |
          set -euo pipefail
          FIG_DIR="${GITHUB_WORKSPACE}/paper_artifacts/${SCENARIO_NAME}/${MODE}/fig"
          {
            echo "### ${SCENARIO_NAME} / ${MODE}"
            if [ ! -d "${FIG_DIR}" ]; then
              echo "- report directory missing: \`${FIG_DIR}\`"
              echo
              exit 0
            fi
            echo "- direct figures artifact: \`paper-fig-${SCENARIO_NAME}-${MODE}\`"
            echo "- full raw+fig artifact: \`paper-data-${SCENARIO_NAME}-${MODE}\`"
            echo "- generated files:"
            for name in summary.csv task_completion_mean.png distance_mean.png event_ms_mean.png coverage_mean.png; do
              if [ -f "${FIG_DIR}/${name}" ]; then
                echo "  - \`fig/${name}\`"
              fi
            done
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload scenario-mode figures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-fig-${{ matrix.scenario.name }}-${{ matrix.mode }}
          path: paper_artifacts/${{ matrix.scenario.name }}/${{ matrix.mode }}/fig
          if-no-files-found: warn
          retention-days: 30

      - name: Upload scenario-mode data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-data-${{ matrix.scenario.name }}-${{ matrix.mode }}
          path: paper_artifacts/${{ matrix.scenario.name }}/${{ matrix.mode }}
          if-no-files-found: warn
          retention-days: 30

  merge-summary:
    runs-on: ubuntu-24.04
    needs: run-batch
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install report deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-matplotlib

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Build merged paper summary and figures
        env:
          MPLBACKEND: Agg
        run: |
          set -euo pipefail
          python3 src/orchard_evaluation/orchard_evaluation/report_generator.py \
            --manifest-glob "${GITHUB_WORKSPACE}/all_artifacts/**/run_manifest.csv" \
            --output-dir "${GITHUB_WORKSPACE}/paper_summary_all" \
            --modes baseline,proposed

      - name: Write merged summary
        if: always()
        run: |
          set -euo pipefail
          OUT_DIR="${GITHUB_WORKSPACE}/paper_summary_all"
          {
            echo "## Merged Paper Summary"
            if [ ! -d "${OUT_DIR}" ]; then
              echo "- merged output directory missing: \`${OUT_DIR}\`"
              echo
              exit 0
            fi
            echo "- artifact: \`paper-summary-all\`"
            echo "- generated files:"
            for name in paper_summary_all.csv task_completion_mean.png distance_mean.png event_ms_mean.png coverage_mean.png; do
              if [ -f "${OUT_DIR}/${name}" ]; then
                echo "  - \`${name}\`"
              fi
            done
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload merged summary
        uses: actions/upload-artifact@v4
        with:
          name: paper-summary-all
          path: paper_summary_all
          if-no-files-found: error
          retention-days: 60
